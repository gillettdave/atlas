# Run backend unit tests on every push and pull request.
name: Backend pytest

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-pytest.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-pytest.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libpq-dev gcc

      - name: Install dependencies
        # requirements-ci.txt is requirements.txt minus playwright (not needed for unit tests).
        run: pip install -r requirements-ci.txt --prefer-binary

      - name: Check for dependency conflicts
        run: pip check

      - name: Smoke-test app imports
        run: |
          python -c "import app.main" && echo "app.main OK"
          python -c "import app.models" && echo "app.models OK"
          python -c "import app.services.ranker" && echo "ranker OK"
          python -c "import app.services.digest_builder" && echo "digest_builder OK"

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=long
